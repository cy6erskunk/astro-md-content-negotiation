name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        astro-version: [5, 6, 7]
    name: ci (astro@${{ matrix.astro-version }})
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Install Astro ${{ matrix.astro-version }}
        if: matrix.astro-version != 7
        run: npm install astro@${{ matrix.astro-version }} --no-save

      - run: npm run typecheck
      - run: npm test
      - run: npm run build
