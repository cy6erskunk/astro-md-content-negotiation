name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.16.0
          cache: npm

      - run: npm ci

      - run: npm run typecheck
      - run: npm test
      - run: npm run build
